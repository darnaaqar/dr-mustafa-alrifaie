pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def file = new File(settingsDir, "local.properties")
        if (file.exists()) {
            properties.load(file.newDataInputStream())
        }
        def sdkPath = properties.getProperty("flutter.sdk")
        assert sdkPath != null, "flutter.sdk not set in local.properties"
        return sdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
        maven {
            url "https://storage.googleapis.com/download.flutter.io"
        }
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.5.5" apply false
    id "com.android.application" version "8.1.0" apply false
}

include ":app"

